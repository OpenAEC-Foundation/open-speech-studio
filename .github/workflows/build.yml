name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Quick check ────────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── 2. Build installers ───────────────────────────────────
  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            label: Windows
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            label: Linux
            args: --bundles deb,rpm
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            label: macOS (ARM)
          - platform: macos-14
            rust-target: x86_64-apple-darwin
            label: macOS (Intel)

    name: Build – ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libasound2-dev \
            libxdo-dev \
            patchelf \
            cmake

      - name: Install npm dependencies
        run: npm ci

      - name: Create bin directory
        shell: bash
        run: mkdir -p bin

      - name: Build whisper.cpp (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          git clone --depth 1 --branch v1.8.3 https://github.com/ggml-org/whisper.cpp.git _whisper_build
          cmake -S _whisper_build -B _whisper_build/build -DCMAKE_BUILD_TYPE=Release
          cmake --build _whisper_build/build --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cp _whisper_build/build/bin/whisper-cli bin/ || cp _whisper_build/build/bin/main bin/whisper-cli
          chmod +x bin/whisper-cli
          # Copy shared libraries
          find _whisper_build/build -name '*.so' -exec cp {} bin/ \; 2>/dev/null || true
          find _whisper_build/build -name '*.dylib' -exec cp {} bin/ \; 2>/dev/null || true
          rm -rf _whisper_build
          ls -la bin/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.rust-target }} ${{ matrix.args || '' }}

      # ── Sign Windows binaries ──────────────────────────────
      - name: Sign Windows binaries
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: src-tauri/target/${{ matrix.rust-target }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows installers
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows MSI
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Upload artifacts ───────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: open-speech-studio-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
          if-no-files-found: ignore
          retention-days: 14

  # ── 2. Publish release ────────────────────────────────────
  publish:
    name: Publish Release
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect installer files
        run: |
          mkdir -p release
          find artifacts -name '*-setup.exe' -exec cp {} release/ \;
          find artifacts -name '*.msi' -exec cp {} release/ \;
          find artifacts -name '*.dmg' -exec cp {} release/ \;
          find artifacts -name '*.AppImage' -exec cp {} release/ \;
          find artifacts -name '*.deb' -exec cp {} release/ \;
          ls -la release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.sha) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Open Speech Studio {0}', github.ref_name) || format('Dev Build {0}', github.sha) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          draft: false
          generate_release_notes: true
          body: |
            **Downloads:**
            - **Windows:** `.exe` (NSIS installer) / `.msi`
            - **macOS:** `.dmg` (Apple Silicon & Intel)
            - **Linux:** `.AppImage` / `.deb`
          files: release/*
